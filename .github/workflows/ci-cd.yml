# .github/workflows/ci-cd.yml
#
# Lightweight CI for the Agentic testing->review->main pipeline.
# Designed to be FAST, RESILIENT, and DEBUGGABLE.
#
# Exit codes reference:
#   0 = success
#   1 = test failures (assertions failed)
#   2 = collection errors (import/syntax errors in test files)
#   5 = no tests collected (treated as success)

name: CI/CD Pipeline

on:
  push:
    branches: [main, dev, 'testing/**', review]
  pull_request:
    branches: [main, dev, review]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "[DEBUG] Show repo structure"
        run: |
          echo "=== Working directory ==="
          pwd
          echo ""
          echo "=== All files in repo ==="
          find . -not -path './.git/*' | sort
          echo ""
          echo "=== Python files ==="
          find . -name "*.py" -not -path './.git/*' | sort
          echo ""
          echo "=== Test files ==="
          find . -name "test_*.py" -o -name "*_test.py" | grep -v ".git" | sort

      - name: Install test runner
        run: |
          python -m pip install --upgrade pip --quiet
          pip install pytest --quiet
          echo "✅ pytest installed"

      - name: Install project deps (if available)
        continue-on-error: true
        run: |
          if [ -f requirements.txt ]; then
            echo "Found requirements.txt, installing..."
            pip install -r requirements.txt --quiet 2>&1 || echo "⚠ Some deps failed, continuing..."
            echo "✅ Dependencies installed"
          else
            echo "⚠ No requirements.txt found, skipping"
          fi

      - name: Prepare Python path
        run: |
          # Make src/ importable
          mkdir -p src
          touch src/__init__.py
          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "✅ PYTHONPATH=$GITHUB_WORKSPACE"
          echo ""
          echo "=== src/ contents ==="
          ls -la src/ || echo "(empty)"

      - name: "[DEBUG] Verify imports"
        continue-on-error: true
        run: |
          echo "=== Testing imports for each src/*.py ==="
          for f in src/*.py; do
            MODULE=$(basename "$f" .py)
            if [ "$MODULE" = "__init__" ]; then continue; fi
            python -c "import src.$MODULE" 2>&1 && echo "  ✅ src.$MODULE" || echo "  ❌ src.$MODULE"
          done

      - name: Run tests
        run: |
          echo "=== Finding test files ==="
          TEST_FILES=$(find . -name "test_*.py" -o -name "*_test.py" | grep -v ".git" | sort)

          if [ -z "$TEST_FILES" ]; then
            echo "No test files found. Passing."
            exit 0
          fi

          echo "$TEST_FILES"
          echo ""
          echo "=== Running pytest ==="

          # --continue-on-collection-errors: don't let one bad import block all tests
          # -v: verbose output
          # --tb=short: short tracebacks
          pytest $TEST_FILES \
            -v \
            --tb=short \
            --no-header \
            --continue-on-collection-errors \
            2>&1

          EXIT_CODE=$?

          echo ""
          echo "=== pytest exit code: $EXIT_CODE ==="
          echo "  0 = all tests passed"
          echo "  1 = some tests failed"
          echo "  2 = test collection errors (import/syntax)"
          echo "  5 = no tests collected"

          if [ $EXIT_CODE -eq 5 ]; then
            echo "⚠ No tests were collected, treating as pass."
            exit 0
          fi

          # Exit code 2 means collection errors — still report as failure
          # but the --continue-on-collection-errors flag ensures other tests still run
          exit $EXIT_CODE